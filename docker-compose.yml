version: '3.8'

services:
  # 后端 API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: my-rag-agent-backend
    ports:
      - "55000:8000"
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-ada-002}
      - CHROMA_DB_PATH=/app/backend/storage/vector_db
      - CHROMA_NAME_JD=${CHROMA_NAME_JD:-jd_help}
      - CHROMA_NAME_LAWS=${CHROMA_NAME_LAWS:-laws}
      - CHROMA_NAME_EXAMPLES=${CHROMA_NAME_EXAMPLES:-examples}
      - CROSS_ENCODER_NAME=${CROSS_ENCODER_NAME:-BAAI/bge-reranker-base}
      - CROSS_ENCODER_MODEL_PATH=${CROSS_ENCODER_MODEL_PATH:-/app/backend/models}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-123456}
      - REDIS_DB=${REDIS_DB:-0}
      - CHAT_MEMORY_PREFIX=${CHAT_MEMORY_PREFIX:-chat:memory}
      - CHAT_MEMORY_MAX_ROUNDS=${CHAT_MEMORY_MAX_ROUNDS:-5}
      - CHAT_MEMORY_EXPIRE_SECONDS=${CHAT_MEMORY_EXPIRE_SECONDS:-86400}
      - MYSQL_URL=mysql+aiomysql://root:${MYSQL_PASSWORD:-123456}@mysql:3306/${MYSQL_DATABASE:-agent}
      - MYSQL_POOL_SIZE=${MYSQL_POOL_SIZE:-10}
      - MYSQL_MAX_OVERFLOW=${MYSQL_MAX_OVERFLOW:-20}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - PASSWORD_CONTEXT_SCHEMES=${PASSWORD_CONTEXT_SCHEMES:-'["argon2"]'}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend/models:/app/backend/models
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - app-network

  # 前端
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:55000}
    container_name: my-rag-agent-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: my-rag-agent-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD:-123456}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-agent}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/init_db.py:/docker-entrypoint-initdb.d/init_db.py
    restart: unless-stopped
    networks:
      - app-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: my-rag-agent-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - app-network

volumes:
  mysql_data:
  redis_data:

networks:
  app-network:
    driver: bridge
